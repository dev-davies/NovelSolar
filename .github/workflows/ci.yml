name: CI — Typecheck · Vitest · Playwright

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel in-flight runs for the same PR / branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════
  # 1. TYPECHECK — nuxi typecheck with baseline regression gate
  # ════════════════════════════════════════════════════════════
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Env vars needed for nuxi prepare + typecheck (Nuxt modules
    # read these at init time; dummy values prevent crashes).
    env:
      NUXT_PUBLIC_SUPABASE_URL: 'https://dummy.supabase.co'
      NUXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy'
      SUPABASE_SERVICE_ROLE_KEY: 'dummy-service-role-key'
      BITRIX_WEBHOOK_URL: 'https://dummy.bitrix24.com/rest/1/dummy/'
      OTP_SECRET: 'ci-otp-secret-long-enough-for-hmac-validation'
      AUTH_SESSION_SECRET: 'ci-session-secret-long-enough-for-hmac'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      # Explicitly generate .nuxt types so typecheck has them
      - name: Generate Nuxt types
        run: npx nuxi prepare

      # nuxi typecheck exits non-zero when there are errors.
      # The project has a known baseline of ~26 errors (Supabase
      # never-typed payloads + multipart unknowns). We capture the
      # count and only fail if it INCREASED.
      - name: Run typecheck (baseline-gated)
        run: |
          set +e
          npx nuxi typecheck 2>&1 | tee typecheck.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          # Count "error TS" lines from production code only.
          # Test files (*.test.ts) are type-loose by design (mocks, replicated
          # logic) and are not part of the baseline.
          ERROR_COUNT=$(grep 'error TS' typecheck.log | grep -cv '\.test\.ts' || true)
          BASELINE=26

          echo "::notice ::Typecheck errors: ${ERROR_COUNT} (baseline: ${BASELINE})"

          if [ "$ERROR_COUNT" -gt "$BASELINE" ]; then
            echo "::error ::Typecheck regression: ${ERROR_COUNT} errors (baseline ${BASELINE}). Fix the new errors before merging."
            exit 1
          fi

          if [ "$ERROR_COUNT" -lt "$BASELINE" ]; then
            echo "::notice ::🎉 Typecheck improved! ${ERROR_COUNT} errors (was ${BASELINE}). Consider updating the baseline in ci.yml."
          fi

      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
          retention-days: 7

  # ════════════════════════════════════════════════════════════
  # 2. VITEST — unit & component tests
  # ════════════════════════════════════════════════════════════
  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Vitest has its own test env in vitest.config.ts.
    # Do NOT set SUPABASE_SERVICE_ROLE_KEY etc. at job level —
    # tests that manipulate process.env would be masked by them.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Run Vitest
        run: npm run test:run -- --reporter=default --reporter=github-actions

  # ════════════════════════════════════════════════════════════
  # 3. PLAYWRIGHT — e2e (Chromium only in CI)
  # ════════════════════════════════════════════════════════════
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Env vars needed for the dev server that Playwright spins up.
    env:
      NUXT_PUBLIC_SUPABASE_URL: 'https://dummy.supabase.co'
      NUXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy'
      SUPABASE_SERVICE_ROLE_KEY: 'dummy-service-role-key'
      BITRIX_WEBHOOK_URL: 'https://dummy.bitrix24.com/rest/1/dummy/'
      OTP_SECRET: 'ci-otp-secret-long-enough-for-hmac-validation'
      AUTH_SESSION_SECRET: 'ci-session-secret-long-enough-for-hmac'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      # Only install Chromium to keep CI fast (~400 MB vs ~1.5 GB)
      - name: Install Playwright (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Run Playwright
        # E2E is non-blocking without real API secrets. Homepage tests
        # fail when Bitrix data is unavailable (UI sections render hidden).
        # The report is still uploaded for review.
        continue-on-error: true
        run: npx playwright test --project=chromium
        env:
          CI: true
          NODE_ENV: test
          # Admin mutation tests gracefully skip when these are absent.
          # Add them as repo secrets to enable full coverage.
          E2E_MASTER_ADMIN_EMAIL: ${{ secrets.E2E_MASTER_ADMIN_EMAIL }}
          E2E_MASTER_ADMIN_PASSWORD: ${{ secrets.E2E_MASTER_ADMIN_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
