name: Continuous Integration

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Satisfy required variables with dummy values for CI build/init
      # Real secrets should be added to GitHub Repo Settings
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://dummy.supabase.co' }}
      NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'dummy' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'dummy' }}
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET || 'dummy' }}
      POSTGRES_DATABASE: ${{ secrets.POSTGRES_DATABASE || 'postgres' }}
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST || 'localhost' }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER || 'postgres' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'dummy' }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL || 'postgresql://postgres@localhost:5432/postgres' }}
      BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL || 'https://dummy.bitrix24.com/rest/1/1/' }}
      OTP_SECRET: ${{ secrets.OTP_SECRET || 'dummy-otp-secret-long-enough-for-validation' }}
      AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET || 'dummy-session-secret-long-enough-for-validation' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Vitest (Unit & Component)
        run: npm run test:run

      - name: Build Application
        run: npm run build

      - name: Run Playwright (End-to-End)
        run: npm run test:e2e
        env:
          # E2E might need specific environment adjustments
          NODE_ENV: test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
