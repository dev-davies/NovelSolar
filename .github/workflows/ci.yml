name: CI — Typecheck · Vitest · Playwright

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel in-flight runs for the same PR / branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────
# Shared env: dummy values satisfy Nuxt module init so that
# nuxi typecheck / nuxt build don't crash on missing config.
# Real secrets should be added via GitHub → Settings → Secrets.
# ──────────────────────────────────────────────────────────────
env:
  NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://dummy.supabase.co' }}
  NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy' }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'dummy-service-role-key' }}
  BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL || 'https://dummy.bitrix24.com/rest/1/dummy/' }}
  OTP_SECRET: ${{ secrets.OTP_SECRET || 'ci-otp-secret-long-enough-for-hmac-validation' }}
  AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET || 'ci-session-secret-long-enough-for-hmac' }}

jobs:
  # ════════════════════════════════════════════════════════════
  # 1. TYPECHECK — nuxi typecheck with baseline regression gate
  # ════════════════════════════════════════════════════════════
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # nuxi typecheck exits non-zero when there are errors.
      # The project has a known baseline of ~26 errors (Supabase
      # never-typed payloads + multipart unknowns). We capture the
      # count and only fail if it INCREASED.
      - name: Run typecheck (baseline-gated)
        run: |
          set +e
          npx nuxi typecheck 2>&1 | tee typecheck.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          # Count "error TS" lines — the canonical marker
          ERROR_COUNT=$(grep -c 'error TS' typecheck.log || true)
          BASELINE=26

          echo "::notice ::Typecheck errors: ${ERROR_COUNT} (baseline: ${BASELINE})"

          if [ "$ERROR_COUNT" -gt "$BASELINE" ]; then
            echo "::error ::Typecheck regression: ${ERROR_COUNT} errors (baseline ${BASELINE}). Fix the new errors before merging."
            exit 1
          fi

          if [ "$ERROR_COUNT" -lt "$BASELINE" ]; then
            echo "::notice ::🎉 Typecheck improved! ${ERROR_COUNT} errors (was ${BASELINE}). Consider updating the baseline in ci.yml."
          fi

      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
          retention-days: 7

  # ════════════════════════════════════════════════════════════
  # 2. VITEST — unit & component tests
  # ════════════════════════════════════════════════════════════
  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Vitest
        run: npm run test:run -- --reporter=default --reporter=github-actions

  # ════════════════════════════════════════════════════════════
  # 3. PLAYWRIGHT — e2e (Chromium only in CI)
  # ════════════════════════════════════════════════════════════
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Only install Chromium to keep CI fast (~400 MB vs ~1.5 GB)
      - name: Install Playwright (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Run Playwright
        run: npx playwright test --project=chromium
        env:
          CI: true
          NODE_ENV: test
          # Admin mutation tests gracefully skip when these are absent.
          # Add them as repo secrets to enable full coverage.
          E2E_MASTER_ADMIN_EMAIL: ${{ secrets.E2E_MASTER_ADMIN_EMAIL }}
          E2E_MASTER_ADMIN_PASSWORD: ${{ secrets.E2E_MASTER_ADMIN_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
