<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | NovelSolar</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container {
      padding: 2rem;
      max-width: 400px;
    }
    .icon {
      font-size: 64px;
      color: #94a3b8;
      margin-bottom: 24px;
    }
    h1 {
      color: #0f172a;
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 900;
    }
    p {
      color: #64748b;
      margin: 0 0 32px;
      line-height: 1.5;
    }
    button {
      background-color: #002888;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="material-symbols-outlined icon">wifi_off</span>
    <h1>You are offline</h1>
    <p>It looks like you've lost your internet connection. Please check your network settings.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
